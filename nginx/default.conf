server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/x-component image/svg+xml;

    # Docker DNS resolver — force runtime resolution so Nginx doesn't
    # fail at startup if backend isn't registered in Docker DNS yet.
    resolver 127.0.0.11 valid=5s;

    # API proxy — with rate limiting
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        # Variable forces Nginx to resolve at runtime, not at startup.
        # IMPORTANT: no trailing path — with variables Nginx sends the
        # value as-is and appends the original request URI.
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
    }

    # Download endpoint — stricter limit
    location = /api/download {
        limit_req zone=download burst=3 nodelay;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 180s;
    }

    # robots.txt explicit
    location = /robots.txt {
        add_header Content-Type text/plain;
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
