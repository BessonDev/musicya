services:
  backend:
    build:
      context: ./backend
      args:
        CACHEBUST: "20260514-v4"
    env_file:
      - .env
    environment:
      - PORT=8000
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - yt_cache:/root/.cache/yt-dlp
    restart: unless-stopped
    networks:
      - musicya

  frontend:
    build: .
    expose:
      - 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - musicya

networks:
  musicya:

volumes:
  yt_cache:
