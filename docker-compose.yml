services:
  backend:
    build:
      context: ./backend
      args:
        CACHEBUST: "20260514-v2"
    environment:
      - PORT=8000
    volumes:
      - yt_cache:/root/.cache/yt-dlp
    restart: unless-stopped
    networks:
      - musicya

  frontend:
    build: .
    expose:
      - 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - musicya

networks:
  musicya:

volumes:
  yt_cache:
